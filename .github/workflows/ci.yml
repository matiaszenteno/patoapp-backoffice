name: CI

# El repo no tenía checks en los PRs: `npm test` y el typecheck sólo corrían en local,
# así que un test roto entraba a main sin que nadie se enterara. El deploy tampoco
# servía de red — corre recién en push a main y hasta ahora no ejecutaba los tests.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 24, no 20: `npm test` corre los .ts directo con node --test, y el type stripping
      # recién viene sin flag desde 23.6. En 20 los tests fallan con
      # ERR_UNKNOWN_FILE_EXTENSION — pasaban sólo en locales con Node nuevo.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      # `npm run build` ya corre tsc, pero lo pedimos aparte para que un error de tipos
      # se reporte como tal y no mezclado con un fallo de bundling.
      - run: npx tsc --noEmit
